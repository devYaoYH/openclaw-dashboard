name: Daily Health Check

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  health:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run full test suite
      run: node test-telemetry.js
    
    - name: Check for outdated dependencies
      run: npm outdated || true
    
    - name: Audit dependencies
      run: npm audit --audit-level=moderate
    
    - name: Test database migrations
      run: |
        node -e "
          const { db } = require('./src/db');
          
          // Verify all tables exist
          const tables = db.prepare(\"SELECT name FROM sqlite_master WHERE type='table'\").all();
          const required = ['events', 'current_work', 'planned_work', 'telemetry_events'];
          
          for (const table of required) {
            if (!tables.some(t => t.name === table)) {
              console.error('❌ Missing table:', table);
              process.exit(1);
            }
          }
          
          // Verify indexes
          const indexes = db.prepare(\"SELECT name FROM sqlite_master WHERE type='index'\").all();
          console.log('Indexes:', indexes.map(i => i.name));
          
          console.log('✅ Database schema healthy');
        "
    
    - name: Create health report
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Health Check Failed',
            body: 'Daily health check detected issues. Check workflow logs for details.',
            labels: ['health-check', 'automated']
          })
